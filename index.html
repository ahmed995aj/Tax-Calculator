<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakistan Tax Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
}

button {
    padding: 12px 20px;
    cursor: pointer;
}

.result {
    margin-top: 25px;
    border: 1px solid #ccc;
    padding: 20px;
}

.result-row {
    margin-bottom: 8px;
}
</style>
</head>

<body>

<h1>Pakistan Tax Calculator</h1>

<div class="form-group">
    <label>Monthly Salary</label>
    <input type="number" id="monthlySalary">
</div>

<div class="form-group">
    <label>Monthly Deduction</label>
    <input type="number" id="monthlyDeduction" value="0">
</div>

<div class="form-group">
    <label>Commission / Bonus</label>
    <input type="number" id="commissionAmount" value="0">
</div>

<div class="form-group">
    <label>Remaining Months</label>
    <input type="number" id="remainingMonths">
</div>

<div class="form-group">
    <label>YTD Taxable Salary</label>
    <input type="number" id="ytdTaxableSalary">
</div>

<div class="form-group">
    <label>YTD Tax Paid</label>
    <input type="number" id="ytdTaxPaid">
</div>

<button onclick="calculateTax()">Calculate Tax</button>

<div class="result" id="result" style="display:none;">
    <h2>Results</h2>

    <div id="annualIncome"></div>
    <div id="baseIncome"></div>
    <div id="baseTax"></div>
    <div id="commissionTax"></div>
    <div id="finalAnnualTax"></div>
    <div id="monthlyBaseTax"></div>
    <div id="monthlyTax"></div>
    <div id="salaryAfterTax"></div>




</div>
<script>
function formatNumber(value) {
    return Number(value).toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function calculateSlabTax(income) {
    let tax = 0;

    if (income <= 600000) tax = 0;
    else if (income <= 1200000) tax = (income - 600000) * 0.01;
    else if (income <= 2200000) tax = 6000 + ((income - 1200000) * 0.11);
    else if (income <= 3200000) tax = 116000 + ((income - 2200000) * 0.23);
    else if (income <= 4100000) tax = 346000 + ((income - 3200000) * 0.30);
    else tax = 616000 + ((income - 4100000) * 0.35);

    return tax;
}

function calculateTax() {

    const monthlySalary = parseFloat(document.getElementById("monthlySalary").value) || 0;
    const monthlyDeduction = parseFloat(document.getElementById("monthlyDeduction").value) || 0;
    const commission = parseFloat(document.getElementById("commissionAmount").value) || 0;
    const remainingMonths = parseInt(document.getElementById("remainingMonths").value) || 0;
    const ytdTaxable = parseFloat(document.getElementById("ytdTaxableSalary").value) || 0;
    const ytdTaxPaid = parseFloat(document.getElementById("ytdTaxPaid").value) || 0;

    if (remainingMonths <= 0 || remainingMonths > 12) {
        alert("Remaining Months must be between 1 and 12");
        return;
    }

    // 1. ANNUAL INCOME (WITH COMMISSION)
    const annualIncome =
        (monthlySalary * remainingMonths) +
        ytdTaxable +
        commission -
        monthlyDeduction ;

    // 2. BASE ANNUAL INCOME (NO COMMISSION)
    const baseIncome = annualIncome - commission;

    // 3. TAX CALCULATION
    const baseTax = calculateSlabTax(baseIncome);
    const totalTax = calculateSlabTax(annualIncome);

    const commissionTax = totalTax - baseTax;

    const finalAnnualTax=baseTax + commissionTax

    // 4. MONTHLY BASE TAX
    let baseRemainingTax = baseTax - ytdTaxPaid;
    if (baseRemainingTax < 0) baseRemainingTax = 0;

    const monthlyBaseTax = baseRemainingTax / remainingMonths;

    // 5. FINAL MONTHLY TAX (IMPORTANT CHANGE)
    const monthlyTax = monthlyBaseTax + commissionTax;

    // 6. SALARY AFTER TAX
    const calculatedSalary= monthlySalary + commission - monthlyDeduction
    const salaryAfterTax =
        calculatedSalary - monthlyTax;

    // OUTPUT
     document.getElementById("baseIncome").innerHTML =
        "<b>Base Income (No Commission):</b> " + formatNumber(baseIncome);

    document.getElementById("annualIncome").innerHTML =
        "<b>Annual Taxable Income:</b> " + formatNumber(annualIncome);

    document.getElementById("baseTax").innerHTML =
        "<b>Base Annual Tax:</b> " + formatNumber(baseTax);

    document.getElementById("commissionTax").innerHTML =
        "<b>Commission Tax :</b> " + formatNumber(commissionTax);

    document.getElementById("finalAnnualTax").innerHTML =
        "<b>Final Annual Tax:</b> " + formatNumber(finalAnnualTax);

    document.getElementById("monthlyBaseTax").innerHTML =
        "<b>Monthly Tax ( No Commission):</b> " + formatNumber(monthlyBaseTax);

    document.getElementById("monthlyTax").innerHTML =
        "<b>Monthly Tax (Commission Included):</b> " + formatNumber(monthlyTax);

    document.getElementById("salaryAfterTax").innerHTML =
        "<b>Salary After Tax:</b> " + formatNumber(salaryAfterTax);




    document.getElementById("result").style.display = "block";
}
</script>
</body>
</html>
