<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakistan Tax Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
}

button {
    padding: 12px 20px;
    cursor: pointer;
}

.result {
    margin-top: 25px;
    border: 1px solid #ccc;
    padding: 20px;
}

.result-row {
    margin-bottom: 8px;
}
.checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
}

.checkbox input {
    width: auto;
    margin: 0;
}

.checkbox label {
    margin: 0;
}
</style>
</head>
<body>

<h1>Pakistan Tax Calculator</h1>

<div class="form-group">
    <label>Monthly Salary</label>
    <input type="number" id="monthlySalary" step="0.01" min="0">
</div>

<div class="form-group">
    <label>Remaining Months</label>
    <input type="number" id="remainingMonths" min="1">
</div>

<div class="form-group">
    <label>YTD Taxable Salary</label>
    <input type="number" id="ytdTaxableSalary" step="0.01" min="0">
</div>

<div class="form-group">
    <label>YTD Tax Paid</label>
    <input type="number" id="ytdTaxPaid" step="0.01" min="0">
</div>

<div class="form-group checkbox">
    <input type="checkbox" id="surcharge">
    <label for="surcharge">Apply Surcharge (9%)</label>
</div>

<button onclick="calculateTax()">Calculate Tax</button>

<div class="result" id="result" style="display:none;">
    <h2>Results</h2>

    <div class="result-row" id="currentEmployerSalary"></div>
    <div class="result-row" id="annualTaxableSalary"></div>
    <div class="result-row" id="baseAnnualTax"></div>
    <div class="result-row" id="surchargeTax"></div>
    <div class="result-row" id="finalAnnualTax"></div>
    <div class="result-row" id="remainingTax"></div>
    <div class="result-row" id="monthlyTax"></div>
    <div class="result-row" id="salaryAfterTax"></div>
</div>

<script>

function formatNumber(value) {
    return Number(value).toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function calculateTax() {

    const monthlySalary =
        parseFloat(document.getElementById("monthlySalary").value) || 0;

    const remainingMonths =
        parseInt(document.getElementById("remainingMonths").value) || 0;

    const ytdTaxableSalary =
        parseFloat(document.getElementById("ytdTaxableSalary").value) || 0;

    const ytdTaxPaid =
        parseFloat(document.getElementById("ytdTaxPaid").value) || 0;

    const surchargeEnabled =
        document.getElementById("surcharge").checked;

    if (remainingMonths <= 0) {
        alert("Remaining Months must be greater than 0.");
        return;
    }

    const surchargeThreshold = 10000001;
    const surchargePercent = 9;

    const currentEmployerSalary =
        monthlySalary * remainingMonths;

    const annualTaxableSalary =
        currentEmployerSalary + ytdTaxableSalary;

    let annualTax = 0;

    if (annualTaxableSalary <= 600000) {
        annualTax = 0;
    }
    else if (annualTaxableSalary <= 1200000) {
        annualTax =
            (annualTaxableSalary - 600000) * 0.01;
    }
    else if (annualTaxableSalary <= 2200000) {
        annualTax =
            6000 +
            ((annualTaxableSalary - 1200000) * 0.11);
    }
    else if (annualTaxableSalary <= 3200000) {
        annualTax =
            116000 +
            ((annualTaxableSalary - 2200000) * 0.23);
    }
    else if (annualTaxableSalary <= 4100000) {
        annualTax =
            346000 +
            ((annualTaxableSalary - 3200000) * 0.30);
    }
    else {
        annualTax =
            616000 +
            ((annualTaxableSalary - 4100000) * 0.35);
    }

    let surchargeTax = 0;

    if (
        surchargeEnabled &&
        annualTaxableSalary >= surchargeThreshold
    ) {
        surchargeTax =
            annualTax * (surchargePercent / 100);
    }

    const finalAnnualTax =
        annualTax + surchargeTax;

    let remainingTax =
        finalAnnualTax - ytdTaxPaid;

    if (remainingTax < 0) {
        remainingTax = 0;
    }

    const monthlyTax =
        remainingTax / remainingMonths;

    const salaryAfterTax =
        monthlySalary - monthlyTax;

    document.getElementById("currentEmployerSalary").innerHTML =
        "<strong>Current Employee Annual Earnings:</strong> " +
        formatNumber(currentEmployerSalary);

    document.getElementById("annualTaxableSalary").innerHTML =
        "<strong>Annual Taxable Salary:</strong> " +
        formatNumber(annualTaxableSalary);

    document.getElementById("baseAnnualTax").innerHTML =
        "<strong>Base Annual Tax:</strong> " +
        formatNumber(annualTax);

    document.getElementById("surchargeTax").innerHTML =
        "<strong>Surcharge Tax:</strong> " +
        formatNumber(surchargeTax);

    document.getElementById("finalAnnualTax").innerHTML =
        "<strong>Final Annual Tax:</strong> " +
        formatNumber(finalAnnualTax);

    document.getElementById("remainingTax").innerHTML =
        "<strong>Remaining Tax:</strong> " +
        formatNumber(remainingTax);

    document.getElementById("monthlyTax").innerHTML =
        "<strong>Monthly Tax:</strong> " +
        formatNumber(monthlyTax);

    document.getElementById("salaryAfterTax").innerHTML =
        "<strong>Salary After Tax:</strong> " +
        formatNumber(salaryAfterTax);

    document.getElementById("result").style.display = "block";
}

</script>

</body>
</html>
